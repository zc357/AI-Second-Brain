<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AI Strategy OS</title>

<style>

body{
font-family:Segoe UI;
background:#fff9db;
margin:0;
}

header{
background:#ffd43b;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

input,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
font-size:15px;
}

button{
background:#ffd43b;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#fcc419;
}

.result{
background:#fff3bf;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.model{
border-left:5px solid #ffd43b;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

AI Strategy OS  
🧠 Personal Strategy System

</header>

<div class="container">

<div class="card">

<h3>問題分析 Decision Engine</h3>

<input id="problem" placeholder="輸入你的問題">

<button onclick="analyze()">開始分析</button>

<div id="analysis"></div>

</div>


<div class="card">

<h3>創新思考 Innovation Engine</h3>

<input id="ideaInput" placeholder="輸入問題">

<button onclick="generateIdeas()">生成創新方案</button>

<div id="ideas"></div>

</div>


<div class="card">

<h3>商業案例 Business Case</h3>

<button onclick="showCases()">查看案例</button>

<div id="cases"></div>

</div>


<div class="card">

<h3>新增知識 Knowledge Base</h3>

<input id="keyword" placeholder="關鍵字">

<textarea id="content" placeholder="輸入知識"></textarea>

<button onclick="saveKnowledge()">儲存</button>

</div>


<div class="card">

<h3>搜尋知識</h3>

<input id="search" placeholder="搜尋">

<button onclick="searchKnowledge()">搜尋</button>

<div id="knowledgeResult"></div>

</div>

</div>


<script>

const models=[

"Black Coffee Rule 黑咖啡法則",
"First Principles 第一性原理",
"Second Order Thinking 第二層思考",
"Inversion Thinking 反向思考",
"Circle of Competence 能力圈",
"Pareto Principle 80/20法則"

]

function analyze(){

let q=document.getElementById("problem").value

let result="<div class='result'><b>問題：</b>"+q+"<br><br>"

models.forEach(m=>{
result+="• "+m+"<br>"
})

result+="</div>"

document.getElementById("analysis").innerHTML=result

}



function generateIdeas(){

let ideas=[

"訂閱制商業模式",
"建立社群會員",
"數據化管理",
"建立品牌故事",
"跨產業合作",
"平台經濟",
"體驗式行銷",
"降低成本創新"

]

let result="<div class='result'>"

ideas.forEach(i=>{
result+="• "+i+"<br>"
})

result+="</div>"

document.getElementById("ideas").innerHTML=result

}



function showCases(){

let cases=[

"Amazon：平台經濟 + 物流優勢",

"Apple：產品 + 生態系",

"Costco：會員制 + 低SKU",

"Toyota：精實生產",

"Starbucks：體驗經濟"

]

let result="<div class='result'>"

cases.forEach(c=>{
result+="• "+c+"<br>"
})

result+="</div>"

document.getElementById("cases").innerHTML=result

}



function saveKnowledge(){

let key=document.getElementById("keyword").value

let content=document.getElementById("content").value

let data=JSON.parse(localStorage.getItem("knowledge"))||{}

data[key]=content

localStorage.setItem("knowledge",JSON.stringify(data))

alert("已儲存")

}



function searchKnowledge(){

let q=document.getElementById("search").value

let data=JSON.parse(localStorage.getItem("knowledge"))||{}

if(data[q]){

document.getElementById("knowledgeResult").innerHTML="<div class='result'>"+data[q]+"</div>"

}else{

document.getElementById("knowledgeResult").innerHTML="<div class='result'>沒有資料</div>"

}

}

</script>

</body>

</html>
