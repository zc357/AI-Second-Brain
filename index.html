<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AI Second Brain</title>

<style>

body{

font-family:Segoe UI;

background:#fff9db;

margin:0;

}

header{

background:#ffd43b;

padding:20px;

text-align:center;

font-size:30px;

font-weight:bold;

}

.container{

max-width:1100px;

margin:auto;

padding:30px;

}

.card{

background:white;

padding:25px;

margin-bottom:25px;

border-radius:10px;

box-shadow:0 6px 18px rgba(0,0,0,0.08);

}

input,textarea,button{

width:100%;

padding:12px;

margin-top:10px;

border-radius:6px;

border:1px solid #ddd;

font-size:15px;

}

button{

background:#ffd43b;

border:none;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#fcc419;

}

.result{

background:#fff3bf;

padding:15px;

margin-top:15px;

border-radius:8px;

}

.model{

border-left:5px solid #ffd43b;

padding:10px;

margin-top:10px;

}

</style>

</head>


<body>

<header>

🧠 AI Second Brain

</header>


<div class="container">

<div class="card">

<h3>🔎 問題分析</h3>

<input id="problem" placeholder="輸入你的問題">

<button onclick="analyze()">開始思考</button>

<div id="analysis"></div>

</div>


<div class="card">

<h3>🚀 創新思考</h3>

<input id="ideaInput" placeholder="輸入問題">

<button onclick="generateIdeas()">生成創新方法</button>

<div id="ideas"></div>

</div>


<div class="card">

<h3>📚 新增知識</h3>

<input id="keyword" placeholder="關鍵字">

<textarea id="content" placeholder="輸入知識"></textarea>

<button onclick="saveKnowledge()">儲存</button>

</div>


<div class="card">

<h3>📖 搜尋知識</h3>

<input id="search" placeholder="搜尋">

<button onclick="searchKnowledge()">搜尋</button>

<div id="knowledgeResult"></div>

</div>

</div>


<script>

const models=[

{

name:"黑咖啡法則 Black Coffee Rule",

idea:"把問題簡化到最核心",

steps:[

"問題核心是什麼？",

"哪些資訊不重要？",

"最簡單解法是什麼？"

]

},

{

name:"第一性原理 First Principles",

idea:"拆解問題到基本事實",

steps:[

"基本事實是什麼？",

"有哪些假設？",

"如果重新開始怎麼做？"

]

},

{

name:"第二層思考 Second Order Thinking",

idea:"思考長期結果",

steps:[

"短期影響？",

"長期影響？",

"是否有連鎖反應？"

]

},

{

name:"反向思考 Inversion Thinking",

idea:"先思考如何失敗",

steps:[

"最糟結果？",

"哪些行為會導致失敗？",

"如何避免？"

]

},

{

name:"能力圈 Circle of Competence",

idea:"只在理解範圍決策",

steps:[

"我懂這領域嗎？",

"優勢在哪？",

"盲點在哪？"

]

},

{

name:"80/20法則 Pareto Principle",

idea:"找出最重要因素",

steps:[

"哪20%最重要？",

"哪些可忽略？",

"如何集中資源？"

]

}

]


function analyze(){

let q=document.getElementById("problem").value

let result="<div class='result'><b>問題：</b>"+q+"<br><br>"

models.forEach(m=>{

result+="<div class='model'>"

result+="<b>"+m.name+"</b><br>"

result+="核心："+m.idea+"<br>"

m.steps.forEach(s=>{

result+="• "+s+"<br>"

})

result+="</div>"

})

result+="</div>"

document.getElementById("analysis").innerHTML=result

}


function generateIdeas(){

let ideas=[

"訂閱制",

"社群會員",

"平台模式",

"數據分析",

"自動化流程",

"跨產業合作",

"品牌故事",

"體驗經濟",

"產品升級",

"降低成本創新"

]

let result="<div class='result'>"

ideas.forEach(i=>{

result+="• "+i+"<br>"

})

result+="</div>"

document.getElementById("ideas").innerHTML=result

}


function saveKnowledge(){

let key=document.getElementById("keyword").value

let content=document.getElementById("content").value

let data=JSON.parse(localStorage.getItem("knowledge"))||{}

data[key]=content

localStorage.setItem("knowledge",JSON.stringify(data))

alert("已儲存")

}


function searchKnowledge(){

let q=document.getElementById("search").value

let data=JSON.parse(localStorage.getItem("knowledge"))||{}

if(data[q]){

document.getElementById("knowledgeResult").innerHTML="<div class='result'>"+data[q]+"</div>"

}else{

document.getElementById("knowledgeResult").innerHTML="<div class='result'>沒有資料</div>"

}

}

</script>

</body>

</html>
