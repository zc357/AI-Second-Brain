<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Strategy OS Smart</title>

<style>

body{
font-family:Segoe UI;
background:#fff9db;
margin:0;
}

header{
background:#ffd43b;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

input,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
font-size:15px;
}

button{
background:#ffd43b;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#fcc419;
}

.result{
background:#fff3bf;
padding:15px;
margin-top:15px;
border-radius:8px;
}

</style>

</head>

<body>

<header>
🧠 AI Strategy OS Smart
</header>

<div class="container">

<div class="card">

<h3>問題分析</h3>

<input id="problem" placeholder="輸入你的問題">

<button onclick="analyze()">AI分析</button>

<div id="analysis"></div>

</div>

</div>

<script>

function analyze(){

let problem=document.getElementById("problem").value

let models=[]
let advice=[]

if(problem.includes("品牌") || problem.includes("行銷")){

models=[
"First Principles 第一性原理",
"Pareto Principle 80/20法則",
"Second Order Thinking 第二層思考"
]

advice=[
"找出品牌核心價值",
"專注最重要客群",
"建立品牌故事與信任"
]

}

else if(problem.includes("投資")){

models=[
"Circle of Competence 能力圈法則",
"Second Order Thinking 第二層思考",
"Inversion Thinking 反向思考"
]

advice=[
"只投資你理解的產業",
"思考長期回報",
"先避免重大錯誤"
]

}

else if(problem.includes("創業") || problem.includes("生意")){

models=[
"First Principles 第一性原理",
"Inversion Thinking 反向思考",
"Pareto Principle 80/20"
]

advice=[
"找到真正市場需求",
"避免資金耗盡",
"專注最重要產品"
]

}

else{

models=[
"Black Coffee Rule 黑咖啡法則",
"First Principles 第一性原理"
]

advice=[
"先簡化問題",
"找出問題核心"
]

}

let result="<div class='result'>"

result+="<b>問題：</b>"+problem+"<br><br>"

result+="<b>推薦思維模型：</b><br>"

models.forEach(m=>{
result+="• "+m+"<br>"
})

result+="<br><b>策略建議：</b><br>"

advice.forEach(a=>{
result+="• "+a+"<br>"
})

result+="</div>"

document.getElementById("analysis").innerHTML=result

}

</script>

</body>
</html>
